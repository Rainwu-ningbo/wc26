name: Hourly prediction refresh

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hourly-prediction-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out website
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh predictions
        run: python refresh_predictions.py

      - name: Publish changed predictions
        run: |
          if git diff --quiet -- predictions.js predictions.json; then
            echo "No prediction changes."
            exit 0
          fi

          git config user.name "wc26 hourly updater"
          git config user.email "actions@users.noreply.github.com"
          git add predictions.js predictions.json
          git commit -m "Hourly prediction refresh"
          git push
