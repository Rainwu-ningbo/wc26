name: Hourly prediction refresh

on:
  schedule:
    # Run twice per hour so a delayed or skipped GitHub schedule still refreshes hourly.
    - cron: "17,47 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  models: read

concurrency:
  group: hourly-prediction-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out website
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh predictions
        run: |
          for attempt in 1 2 3; do
            python refresh_predictions.py && exit 0
            echo "Refresh attempt ${attempt} failed; retrying..."
            sleep 30
          done
          exit 1

      - name: Generate GPT predictions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPT_MODEL: openai/gpt-4.1
        run: python gpt_predict.py

      - name: Publish changed predictions
        run: |
          if git diff --quiet -- predictions.js predictions.json; then
            echo "No prediction changes."
            exit 0
          fi

          git config user.name "wc26 hourly updater"
          git config user.email "actions@users.noreply.github.com"
          git add predictions.js predictions.json
          git commit -m "Hourly prediction refresh"
          git push
